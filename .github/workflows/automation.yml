name: Repository Maintenance

on:
  schedule:
    - cron: "30 1 * * *"
  pull_request:
    types: [labeled, opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  stale:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@28ca1036281a5e38b8194cd9db12844fe96916f3  # v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: 'This issue is stale because it has been open 30 days with no activity.'
          days-before-stale: 30
          days-before-close: 7

  automerge:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' && (
        (github.event.pull_request.user.login == 'dboone323' && contains(github.event.pull_request.labels.*.name, 'github-actions')) ||
        (github.event.pull_request.user.login == 'dependabot[bot]' && (
          contains(github.event.pull_request.labels.*.name, 'dependencies') ||
          contains(github.event.pull_request.labels.*.name, 'python') ||
          contains(github.event.pull_request.labels.*.name, 'github-actions')
        ))
      )
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Automerge PR
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
